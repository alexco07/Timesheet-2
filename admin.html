<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Enroll Employee</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="face-api.min.js"></script>
  <script defer src="admin.js"></script>
  <style>
    /* Admin specific styles */
    .admin-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      max-width: 1000px;
      margin: 40px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }
    .video-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #admin-video {
      width: 100%;
      height: auto;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      background: #f44336;
      color: white;
      font-weight: bold;
      margin-top: 15px;
    }
    .status-badge.success {
      background: #4caf50;
    }
  </style>
</head>
<body>

  <div class="admin-container">
    <!-- Left Column: Form -->
    <div>
      <h2 style="margin-top: 0; color: var(--primary);">Enroll New Employee</h2>
      <form id="enroll-form">
        <div class="form-group">
          <label>Employee ID</label>
          <input type="text" id="emp-id" required placeholder="e.g., EMP-001">
        </div>
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="emp-name" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="emp-lastname" required>
        </div>
        <div class="form-group">
          <label>PIN Code (Backup login)</label>
          <input type="password" id="emp-pin" required maxlength="4">
        </div>
        <div class="form-group">
          <label>Department</label>
          <select id="emp-dept" required>
            <option value="Engineering">Engineering</option>
            <option value="Sales">Sales</option>
            <option value="Support">Support</option>
            <option value="HR">HR</option>
          </select>
        </div>
        <button type="submit" id="submit-btn" class="btn-large btn-primary" style="width: 100%; height: 60px; font-size: 1.2rem;" disabled>Save Employee</button>
      </form>
    </div>

    <!-- Right Column: Camera & Face API -->
    <div style="text-align: center;">
      <div id="model-status" style="margin-bottom: 15px; font-weight: bold; color: #666;">Loading AI Models...</div>
      
      <div class="video-wrapper">
        <video id="admin-video" autoplay muted></video>
        <canvas id="admin-overlay"></canvas>
      </div>

      <button type="button" id="capture-btn" class="btn-secondary" style="margin-top: 20px; width: 100%;" disabled>
        Scan Face
      </button>

      <div id="capture-status" class="status-badge">No face scanned yet</div>
    </div>
  </div>

</body>
</html>
