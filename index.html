<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Test & Timesheet</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Face Recognition Test</h1>

    <div id="video-container">
        <video id="video" autoplay muted></video>
    </div>

    <br>

    <div id="controls">
        <button onclick="startCamera()">Start Camera</button>
        
        <div class="section-divider">
            <input id="name" type="text" placeholder="Name">
            <input id="email" type="email" placeholder="Email">
            <br>
            <button onclick="registerFace()">Register Face</button>
            <button onclick="recognizeFace()">Recognize Face</button>
        </div>

        <hr>
        <h2>Timesheet Clock In/Out</h2>
        <div class="section-divider">
            <input id="pin" type="password" placeholder="Enter PIN">
            <br>
            <button onclick="submitClock('Clock In')">Clock In</button>
            <button onclick="submitClock('Clock Out')">Clock Out</button>
        </div>
    </div>

    <div id="status">
        Loading models...
    </div>

    <script src="app.js"></script>

</body>

</html>
