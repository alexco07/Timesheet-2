<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Face Recognition Test</title>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
        }

        video {
            width: 500px;
            max-width: 100%;
            border-radius: 12px;
        }

        button {
            padding: 15px 25px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        input {
            padding: 12px;
            font-size: 18px;
            margin: 5px;
        }

        #status {
            margin-top: 20px;
            font-size: 18px;
        }

    </style>

</head>

<body>

    <h1>Face Recognition Test</h1>

    <video id="video"
           autoplay
           muted></video>

    <br>

    <input
        id="name"
        type="text"
        placeholder="Name">

    <input
        id="email"
        type="email"
        placeholder="Email">

    <br>

    <button onclick="startCamera()">
        Start Camera
    </button>

    <button onclick="registerFace()">
        Register Face
    </button>

    <button onclick="recognizeFace()">
        Recognize Face
    </button>

    <div id="status">
        Loading models...
    </div>

    <script src="app.js"></script>

</body>

</html>
