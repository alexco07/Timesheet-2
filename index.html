<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timesheet Kiosk</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <h1>Cafeteria Timesheet Kiosk</h1>
    <div class="links">
      <a href="admin.html">Admin</a>
      <a href="register.html">Enrollment</a>
    </div>
  </nav>

  <div class="container">
    <div class="kiosk-layout">
      <div class="camera-section">
        <video id="video" width="640" height="480" autoplay muted></video>
        <canvas id="overlay"></canvas>
        <div id="status-msg" class="status-loading">Loading camera and models...</div>
      </div>
      
      <div class="actions-section">
        <h2 id="employee-name">Please look at the camera</h2>
        <p id="employee-id">ID: ---</p>
        
        <div class="buttons disabled" id="action-buttons">
          <button id="btn-clock-in" class="btn btn-primary" onclick="handleClockAction('clockIn')">CLOCK IN</button>
          <button id="btn-clock-out" class="btn btn-secondary" onclick="handleClockAction('clockOut')">CLOCK OUT</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Added defer to ensure these run after face-api.js -->
  <script defer src="js/api.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
