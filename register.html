<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Employee</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <h1>Register New Employee</h1>
    <div class="links">
      <a href="index.html">Kiosk</a>
      <a href="admin.html">Admin</a>
    </div>
  </nav>

  <div class="container">
    <div class="form-container">
      <div class="form-group">
        <label>Employee ID:</label>
        <input type="text" id="emp-id" placeholder="e.g. EMP001">
      </div>
      <div class="form-group">
        <label>Full Name:</label>
        <input type="text" id="emp-name" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" id="emp-email" placeholder="john@example.com">
      </div>
      
      <div class="camera-section small-cam">
        <video id="video" width="320" height="240" autoplay muted></video>
        <p id="reg-status">Loading models...</p>
      </div>

      <button id="btn-register" class="btn btn-primary" disabled onclick="captureAndRegister()">Capture Face & Register</button>
    </div>
  </div>

  <!-- Added defer to ensure these run after face-api.js -->
  <script defer src="js/api.js"></script>
  <script defer src="js/register.js"></script>
</body>
</html>
